name: Fetch Podcast Episodes

on:
  push:
    branches:
      - Main
  schedule:
    - cron: '0 0 * * *'

jobs:
  fetch-episodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
      
      - name: Install dependencies
        run: |
          gem install nokogiri
      
      - name: Fetch podcast episodes
        run: ruby scripts/fetch_episodes.rb
      
      - name: Copy JSON files to public directory
        run: |
          cp _data/podcast_episodes.json podcast_episodes.json
          cp _data/podcast_videos.json podcast_videos.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add podcast_episodes.json podcast_videos.json
            git commit -m "Update podcast JSON files (automated)"
            git push
          fi
